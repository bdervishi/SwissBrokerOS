<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwissBroker OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                50: 'rgb(var(--color-brand-50) / <alpha-value>)',
                100: 'rgb(var(--color-brand-100) / <alpha-value>)',
                500: 'rgb(var(--color-brand-500) / <alpha-value>)',
                600: 'rgb(var(--color-brand-600) / <alpha-value>)',
                700: 'rgb(var(--color-brand-700) / <alpha-value>)',
                900: 'rgb(var(--color-brand-900) / <alpha-value>)',
              },
              slate: {
                850: '#1e293b',
                900: '#0f172a',
                950: '#020617',
              }
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      body { font-family: 'Inter', sans-serif; }
      /* Custom scrollbar for dashboard tables */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }

      /* Default Variables (will be overwritten by BrandingContext) */
      :root {
          --color-brand-50: 240 249 255;   /* #f0f9ff */
          --color-brand-100: 224 242 254;  /* #e0f2fe */
          --color-brand-500: 14 165 233;   /* #0ea5e9 */
          --color-brand-600: 2 132 199;    /* #0284c7 */
          --color-brand-700: 3 105 161;    /* #0369a1 */
          --color-brand-900: 12 74 110;    /* #0c4a6e */
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@react-three/drei": "https://esm.sh/@react-three/drei@^10.7.7",
    "@react-three/fiber": "https://esm.sh/@react-three/fiber@^9.4.2",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
    "three": "https://esm.sh/three@^0.182.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "framer-motion": "https://esm.sh/framer-motion@^11.11.11"
  }
}
</script>
</head>
  <body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased transition-colors duration-300">
    <div id="root"></div>
  </body>
</html>
